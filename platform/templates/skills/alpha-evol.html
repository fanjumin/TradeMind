<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Alpha Evol</title>
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <link rel="stylesheet" href="/static/skills/alpha-evol.css">
</head>
<body class="bg-[#071026] text-white font-sans">
  <div id="alpha-evol-root" class="p-6 max-w-6xl mx-auto">
    <div class="glass-card flex flex-col lg:flex-row gap-6 p-6 rounded-xl">
      <div class="w-full lg:w-1/3 flex flex-col items-center">
        <div id="ae-avatar" class="avatar relative w-64 h-64 mb-4" aria-hidden="true">
          <img id="ae-avatar-img" src="/static/skills/avatar_lvl1.png" alt="Alpha" class="w-full h-full object-contain rounded-lg"/>
          <canvas id="ae-particles" class="absolute inset-0 pointer-events-none"></canvas>
        </div>
        <div class="text-center w-full">
          <div class="text-sm text-slate-300">等级</div>
          <div id="ae-level" class="text-3xl font-semibold neon-gradient">Lv. 1</div>
        </div>
      </div>

      <div class="w-full lg:w-2/3 flex flex-col gap-4">
        <div class="flex flex-col lg:flex-row gap-4">
          <div id="ae-radar" class="flex-1 min-h-[260px] rounded-lg"></div>
          <div class="w-full lg:w-80 bg-[rgba(255,255,255,0.02)] rounded-lg p-4">
            <div class="text-sm text-slate-300">经验</div>
            <div class="mt-2 bg-slate-900 rounded-full h-4 overflow-hidden">
              <div id="ae-exp-bar" class="h-4 bg-gradient-to-r from-[#00f6ff] via-[#7c4dff] to-[#00ffa3] transition-all" style="width:10%"></div>
            </div>
            <div id="ae-exp-text" class="text-xs text-slate-400 mt-2">10 / 100</div>
            <div class="mt-4 text-sm text-slate-300">本次获得</div>
            <div id="ae-exp-gain" class="text-sm font-medium neon-green">+0 EXP</div>
            <div class="mt-4 text-sm text-slate-300">进化日志</div>
            <div id="ae-log" class="mt-2 max-h-36 overflow-auto text-xs text-slate-300 space-y-2"></div>
          </div>
        </div>

        <div class="analysis-area bg-[rgba(255,255,255,0.02)] rounded-lg p-4">
          <div class="flex items-center justify-between">
            <div class="text-lg font-semibold">分析结果</div>
            <div class="text-sm text-slate-400" id="ae-meta">{symbol} · {timestamp}</div>
          </div>
          <div id="ae-analysis-summary" class="mt-3 text-sm text-slate-200"></div>
          <div id="ae-signals" class="mt-3"></div>
          <div id="ae-kline" class="mt-4 h-48 rounded-lg bg-[#020617]"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/libs/echarts.min.js"></script>
  <script src="/static/skills/alpha-evol.js"></script>
  <script>
    // 示例：前端如何用后端返回的 JSON 初始化组件
    document.addEventListener('DOMContentLoaded', function(){
      // 示例数据，实际由后端替换
      const demo = {
        symbol: '600519',
        timestamp: new Date().toISOString(),
        level: 2,
        exp: 240,
        exp_to_next: 500,
        gain: 120,
        ability_scores: {technical:72,fundamental:65,sentiment:58,risk:70,execution:60},
        evolution_log: [{time:new Date().toISOString(),delta_exp:120,desc:'技术因子优化，技术 +5'}],
        analysis: {summary:'短期趋势向上，注意前高阻力。',signals:[{type:'buy',price:230.5,time:new Date().toLocaleTimeString(),note:'突破20日均线'}],kline:[]}
      };
      if(window.initAlphaEvol) window.initAlphaEvol('#alpha-evol-root', demo);
      // 若后端后来推送更新，可调用 updateAlphaEvol
      // window.updateAlphaEvol({level:3,exp:320,gain:80,ability_scores:{technical:75}})
    });
  </script>
</body>
</html>
